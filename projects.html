<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Projects | Firman Adi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { poppins: ['Poppins', 'sans-serif'] },
                    colors: { primary: '#4F46E5', secondary: '#E0E7FF' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-poppins">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-sm border-b border-gray-200 py-6 px-8">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <a href="home.html" class="text-2xl font-bold text-gray-900 hover:text-primary transition">PORTFOLIO</a>
            
            <div class="flex space-x-6 text-sm font-semibold text-gray-500">
                <button onclick="filterProjects('All', this)" class="filter-btn text-primary border-b-2 border-primary pb-1 transition">All</button>
                <button onclick="filterProjects('UI/UX', this)" class="filter-btn hover:text-primary border-b-2 border-transparent hover:border-primary pb-1 transition">UI/UX</button>
                <button onclick="filterProjects('AI / Python', this)" class="filter-btn hover:text-primary border-b-2 border-transparent hover:border-primary pb-1 transition">AI/Python</button>
                <button onclick="filterProjects('Graphic Design', this)" class="filter-btn hover:text-primary border-b-2 border-transparent hover:border-primary pb-1 transition">Graphic Design</button>
            </div>
        </div>
    </nav>

    <section class="py-16">
        <div class="max-w-7xl mx-auto px-8">
            <div id="full-project-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10">
                </div>
        </div>
    </section>

    <script>
        // DATABASE LOKAL PROYEK KAMU
        const allProjects = [
            {
                category: "AI / Python",
                title: "Heart Failure Prediction",
                description: "Transforming dataset into an interactive predictive model experience.",
                image: "assets/project1.png",
                link: "project-heart.html" // Link ke halaman detail!
            },
            {
                category: "UI/UX",
                title: "Japanese Learning App",
                description: "Interactive mobile experience for self-learners.",
                image: "assets/project2.png",
                link: "#"
            },
            {
                category: "AI / Python",
                title: "Text Summarization Gemma",
                description: "Leveraging Recurrent Gemma model to automate text summarization.",
                image: "assets/project3.png",
                link: "#"
            },
            {
                category: "Graphic Design",
                title: "Social Media Campaign",
                description: "Designing modern Instagram feeds for local brand.",
                image: "assets/project4.png",
                link: "#"
            }
        ];

        const gridContainer = document.getElementById('full-project-grid');
        const filterBtns = document.querySelectorAll('.filter-btn');

        function renderProjects(data) {
            gridContainer.innerHTML = ""; 
            data.forEach(project => {
                const cardHTML = `
                    <a href="${project.link}" class="group block bg-secondary/30 p-6 rounded-2xl border border-transparent hover:border-indigo-200 hover:bg-secondary/50 hover:-translate-y-2 transition duration-300">
                        <div class="h-56 bg-white rounded-xl mb-6 overflow-hidden shadow-sm">
                            <img src="${project.image}" alt="${project.title}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" onerror="this.style.display='none'"> 
                        </div>
                        <div class="text-xs font-bold text-primary uppercase tracking-wide mb-2">${project.category}</div>
                        <h3 class="font-bold text-xl mb-2 text-gray-900 group-hover:text-primary transition">${project.title}</h3>
                        <p class="text-gray-500 text-sm leading-relaxed">
                            ${project.description}
                        </p>
                    </a>
                `;
                gridContainer.innerHTML += cardHTML;
            });
        }

        function filterProjects(category, clickedButton) {
            filterBtns.forEach(btn => {
                btn.classList.remove('text-primary', 'border-primary');
                btn.classList.add('border-transparent');
            });

            clickedButton.classList.remove('border-transparent');
            clickedButton.classList.add('text-primary', 'border-primary');

            if (category === 'All') {
                renderProjects(allProjects);
            } else {
                const filteredData = allProjects.filter(project => project.category === category);
                renderProjects(filteredData);
            }
        }

        renderProjects(allProjects);
    </script>
</body>
</html>
